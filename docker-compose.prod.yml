# Production overrides for a cloud GPU demo instance.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    restart: unless-stopped
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

  vision-service:
    restart: unless-stopped

  frontend:
    restart: unless-stopped

  qdrant:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  postgres:
    restart: unless-stopped
